<!doctype html>
<!--
  TV Speech Display Page
  Shows the active speaker, live countdown, speech status, and Socket.IO
  connection state for chamber TV screens during the order-of-speech flow.
-->
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>TV - Fala</title>
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎤</text></svg>"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/portal.css" />

    <style>
      body {
        font-family: Inter, system-ui, sans-serif;
        background: var(--background-dark);
        color: var(--primary-text);
        margin: 0;
        padding: 0;
        overflow: hidden; /* Evitar scrollbars na TV */
      }

      .tv-layout {
        height: 100vh;
        width: 100vw;
        margin: 0;
        padding: 4vmin;
        display: flex;
        gap: 4vmin;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
      }

      .orador-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2vh;
      }

      .orador-foto {
        width: 50vmin; /* Relativo ao menor lado da tela */
        height: 50vmin;
        border-radius: 2vmin;
        object-fit: cover;
        background: var(--background-light);
        border: 1px solid var(--border-color);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      .orador-nome-bottom {
        font-size: 5vmin;
        font-weight: 900;
        line-height: 1.1;
        text-align: center;
        color: var(--primary-text);
        max-width: 45vw;
      }

      .timer {
        width: 40vw; /* Largura relativa */
        height: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2vh;
        padding: 4vmin;
        border-radius: 3vmin;
        background: linear-gradient(
          135deg,
          var(--card-bg) 0%,
          var(--background-light) 100%
        );
        border: 2px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
        position: relative;
        overflow: hidden;
      }

      .timer::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1vmin; /* Espessura relativa */
        background: linear-gradient(
          90deg,
          var(--accent-blue),
          var(--accent-green),
          var(--accent-gold)
        );
        opacity: 0.95;
        pointer-events: none;
      }

      /* Cores por status */
      .timer.state-preparada::before {
        background: linear-gradient(
          90deg,
          var(--accent-orange),
          rgba(240, 136, 51, 0.35)
        );
      }

      .timer.state-iniciada::before {
        background: linear-gradient(
          90deg,
          var(--accent-green),
          rgba(46, 160, 67, 0.35)
        );
      }

      .timer.state-pausada::before {
        background: linear-gradient(
          90deg,
          var(--accent-gold),
          rgba(212, 175, 55, 0.35)
        );
      }

      .timer.state-tempo_esgotado::before {
        background: linear-gradient(90deg, #da3633, rgba(218, 54, 51, 0.35));
      }

      .timer.state-encerrada::before {
        background: linear-gradient(
          90deg,
          rgba(139, 148, 158, 0.9),
          rgba(139, 148, 158, 0.25)
        );
      }

      .timer.state-tempo_esgotado .timer-sub {
        color: #ff7b72;
      }

      .timer.state-iniciada .timer-sub {
        color: rgba(46, 160, 67, 0.95);
      }

      .timer.state-preparada .timer-sub {
        color: rgba(240, 136, 51, 0.95);
      }

      .timer.state-pausada .timer-sub {
        color: rgba(212, 175, 55, 0.95);
      }

      .timer.state-encerrada .timer-sub {
        color: rgba(139, 148, 158, 0.95);
      }

      .timer::after {
        content: "";
        position: absolute;
        inset: -40%;
        background: radial-gradient(
          circle at 20% 20%,
          rgba(255, 255, 255, 0.08),
          transparent 60%
        );
        transform: rotate(10deg);
        pointer-events: none;
      }

      .timer {
        outline: 1px solid rgba(0, 0, 0, 0.35);
        outline-offset: -1px;
      }

      .timer-value {
        font-size: 15vmin; /* Gigante e relativo */
        font-weight: 900;
        letter-spacing: 2px;
        line-height: 1;
        text-shadow: 0 1vmin 3vmin rgba(0, 0, 0, 0.35);
      }

      .timer-sub {
        font-size: 3vmin;
        font-weight: 800;
        color: var(--secondary-text);
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }

      .progress {
        width: 100%;
        height: 16px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.18);
        overflow: hidden;
      }

      .progress > div {
        height: 100%;
        width: 0%;
        background: linear-gradient(
          90deg,
          #2ea043,
          var(--accent-gold),
          #da3633
        );
        transition: width 0.25s linear;
      }

      .banner-ended {
        padding: 18px;
        border-radius: 12px;
        border: 1px solid rgba(248, 81, 73, 0.35);
        background: rgba(248, 81, 73, 0.12);
        color: var(--accent-red);
        font-weight: 900;
        font-size: 2.2rem;
        text-align: center;
        display: none;
      }

      .connection-badge {
        position: fixed;
        top: 12px;
        right: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: #5cb85c;
        padding: 8px 12px;
        border-radius: 20px;
        color: white;
        font-weight: 700;
        z-index: 1000;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.12);
          opacity: 0.65;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <!-- Live connection status for the TV socket session. -->
    <div class="connection-badge" id="connectionBadge">
      <div id="connectionBadgeText">Conectado</div>
    </div>

    <!-- Full-screen TV layout with speaker identity and countdown timer. -->
    <div class="tv-layout">
      <!-- Speaker photo and display name area. -->
      <div class="orador-area">
        <img id="oradorFoto" class="orador-foto" src="" alt="Foto do orador" />
        <div class="orador-nome-bottom" id="oradorNomeBottom">
          Aguardando...
        </div>
      </div>

      <!-- Speech timer, progress bar, and time-up banner. -->
      <div>
        <div class="timer" id="timerContainer" aria-live="polite">
          <div class="timer-value" id="timerValue">--:--</div>
          <div class="timer-sub" id="statusText">Preparada</div>
          <div class="progress" aria-hidden="true">
            <div id="progressBar"></div>
          </div>
        </div>
        <div class="banner-ended" id="timeUpBanner">Tempo esgotado</div>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="../js/mockMode.js?v=4"></script>
    <script src="../js/global.js"></script>

    <script>
      // Cached DOM references for live TV rendering.
      const connectionBadge = document.getElementById("connectionBadge");
      const connectionBadgeText = document.getElementById(
        "connectionBadgeText",
      );

      const oradorFoto = document.getElementById("oradorFoto");
      const oradorNomeBottom = document.getElementById("oradorNomeBottom");
      const statusText = document.getElementById("statusText");
      const timerValue = document.getElementById("timerValue");
      const progressBar = document.getElementById("progressBar");
      const timeUpBanner = document.getElementById("timeUpBanner");

      let tvSocket = null;
      let camaraId = null;

      let falaState = null; // payload DB: { tempoRestanteSegundos, status, ... }
      let timerInterval = null;
      let timeUpAlreadyBeeped = false;
      let timerAnchorMs = null;
      let timerAnchorRemaining = null;
      let timeUpReportedToServer = false;

      // Avoids unnecessary image reloads when repeated socket updates arrive.
      // Cache de URLs de imagens já carregadas (evita re-download)
      const imageCache = new Map();

      // Returns a cached image URL reference for speaker photos.
      function getCachedImageUrl(url) {
        if (!url) return null;
        if (imageCache.has(url)) return imageCache.get(url);
        imageCache.set(url, url);
        return url;
      }

      // Updates the visible socket connection badge.
      function setConnectionBadge(ok, label) {
        connectionBadge.style.background = ok ? "#5cb85c" : "#d9534f";
        connectionBadgeText.textContent = label;
      }

      // Formats a second count as a two-digit MM:SS timer.
      function formatMMSS(totalSeconds) {
        const s = Math.max(0, Math.floor(totalSeconds));
        const mm = String(Math.floor(s / 60)).padStart(2, "0");
        const ss = String(s % 60).padStart(2, "0");
        return `${mm}:${ss}`;
      }

      // Plays a short bell sound when the speech timer reaches zero.
      function playTimeUpBeep(count = 1) {
        // Campainha de Mesa (Table Bell)
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;

          const ctx = new AudioContext();

          if (ctx.state === "suspended") {
            ctx.resume().catch((e) => console.warn("Autoplay bloqueado:", e));
          }

          const now = ctx.currentTime;

          // Sintetizador de Sino Metálico (Additive Synthesis)
          const createBellPart = (freq, gainVal, decay) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.type = "sine";
            osc.frequency.setValueAtTime(freq, now);

            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(gainVal, now + 0.01); // Ataque imediato (percussivo)
            gain.gain.exponentialRampToValueAtTime(0.001, now + decay); // Cauda longa

            osc.connect(gain);
            gain.connect(ctx.destination);

            osc.start(now);
            osc.stop(now + decay + 0.1);
          };

          // Fundamental + Harmônicos não-inteiros (característica de metal/sino)
          createBellPart(700, 0.5, 2.5); // Fundamental
          createBellPart(1100, 0.3, 1.8); // Harmônico brilho
          createBellPart(1900, 0.1, 1.0); // "Ping" agudo inicial

          // Limpeza
          setTimeout(() => {
            if (ctx.state !== "closed") ctx.close();
          }, 3000);
        } catch (e) {
          console.error("Erro ao tocar bip:", e);
        }
      }

      // Renders the current speech state into the TV display.
      function renderBase() {
        if (!falaState) {
          oradorNomeBottom.textContent = "Aguardando...";
          oradorFoto.src = "";
          timerValue.textContent = "--:--";
          statusText.textContent = "Sem fala";
          const timerEl = document.getElementById("timerContainer");
          if (timerEl) {
            timerEl.classList.remove(
              "state-preparada",
              "state-iniciada",
              "state-pausada",
              "state-tempo_esgotado",
              "state-encerrada",
            );
          }
          progressBar.style.width = "0%";
          timeUpBanner.style.display = "none";
          return;
        }

        const nome = falaState.oradorNome || "Orador";
        const partido = falaState.partidoSigla
          ? ` - ${falaState.partidoSigla}`
          : "";
        oradorNomeBottom.textContent = `${nome}${partido}`;

        // Foto do orador (com cache)
        const cachedUrl = getCachedImageUrl(falaState.oradorFotoUrl);
        if (cachedUrl) {
          oradorFoto.src = cachedUrl;
        }

        const totalBudgetSeconds =
          Math.max(
            0,
            Math.trunc(Number(falaState.tempoFalaMinutos || 0)) * 60,
          ) +
          Math.max(
            0,
            Math.trunc(Number(falaState.tempoAdicionadoTotalMinutos || 0)) * 60,
          );

        let remaining =
          falaState.tempoRestanteSegundos != null
            ? Math.max(0, Math.trunc(Number(falaState.tempoRestanteSegundos)))
            : 0;

        if (
          falaState.status === "iniciada" &&
          timerAnchorMs &&
          timerAnchorRemaining != null
        ) {
          const elapsed = Math.floor((Date.now() - timerAnchorMs) / 1000);
          remaining = Math.max(
            0,
            Math.trunc(timerAnchorRemaining) - Math.max(0, elapsed),
          );
        }

        timerValue.textContent = formatMMSS(remaining);

        const pct =
          totalBudgetSeconds > 0 ? (remaining / totalBudgetSeconds) * 100 : 0;
        progressBar.style.width = `${Math.max(0, Math.min(100, pct)).toFixed(2)}%`;

        const timerEl = document.getElementById("timerContainer");
        if (timerEl) {
          timerEl.classList.remove(
            "state-preparada",
            "state-iniciada",
            "state-pausada",
            "state-tempo_esgotado",
            "state-encerrada",
          );
          if (falaState.status) {
            timerEl.classList.add(`state-${falaState.status}`);
          }
        }

        if (falaState.status === "preparada") {
          statusText.textContent = "Preparada";
          timeUpBanner.style.display = "none";
        } else if (falaState.status === "iniciada") {
          statusText.textContent = "Em andamento";
          timeUpBanner.style.display = remaining <= 0 ? "block" : "none";
        } else if (falaState.status === "pausada") {
          statusText.textContent = "Pausada";
          timeUpBanner.style.display = "none";
        } else if (falaState.status === "tempo_esgotado") {
          statusText.textContent = "Tempo esgotado";
          timeUpBanner.style.display = "block";
        } else if (falaState.status === "encerrada") {
          statusText.textContent = "Encerrada";
          timeUpBanner.style.display = "none";
        }
      }

      // Stops the local timer loop when speech is closed or redirected.
      function stopTimer() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
      }

      // Starts the local timer loop and handles time-up side effects.
      function startTimerLoop() {
        stopTimer();
        timeUpAlreadyBeeped = false;
        timeUpReportedToServer = false;

        timerInterval = setInterval(() => {
          if (!falaState) return;

          renderBase();

          const remaining =
            falaState.status === "iniciada" &&
            timerAnchorMs &&
            timerAnchorRemaining != null
              ? Math.max(
                  0,
                  Math.trunc(timerAnchorRemaining) -
                    Math.max(
                      0,
                      Math.floor((Date.now() - timerAnchorMs) / 1000),
                    ),
                )
              : Math.max(
                  0,
                  Math.trunc(Number(falaState.tempoRestanteSegundos || 0)),
                );

          if (
            remaining <= 0 &&
            (falaState.status === "iniciada" ||
              falaState.status === "tempo_esgotado")
          ) {
            if (!timeUpAlreadyBeeped) {
              timeUpAlreadyBeeped = true;
              playTimeUpBeep();
            }

            // Persistir tempo_esgotado no backend (para painel + histórico)
            if (
              !timeUpReportedToServer &&
              falaState.status === "iniciada" &&
              falaState.historicoFalaId
            ) {
              timeUpReportedToServer = true;
              try {
                const token = localStorage.getItem("authToken");
                if (token) {
                  fetch(
                    `/api/fala-ao-vivo/tempo-esgotado/${falaState.historicoFalaId}`,
                    {
                      method: "POST",
                      headers: { Authorization: `Bearer ${token}` },
                    },
                  ).catch(() => {});
                }
              } catch (_) {
                // ignora
              }
            }
          }
        }, 250);
      }

      // Applies a socket or polling payload and synchronizes local timer anchors.
      function applyFalaUpdate(payload) {
        if (!payload) return;

        const newStatus = payload.status;
        const newTempoRestante = Number(payload.tempoRestanteSegundos);
        const serverTimestamp =
          payload.serverTime || payload.timestamp || Date.now();

        // Verificar se precisamos resetar o timer (detectar "drift" ou mudança de status)
        let shouldResetTimer = true;

        if (
          falaState &&
          falaState.status === "iniciada" &&
          newStatus === "iniciada" &&
          timerAnchorMs
        ) {
          // Calcular quanto tempo "localmente" achamos que resta
          const elapsedLocal = (Date.now() - timerAnchorMs) / 1000;
          const currentLocalRemaining = Math.max(
            0,
            timerAnchorRemaining - elapsedLocal,
          );

          // Diferença entre o que o servidor diz e o que calculamos
          const diff = Math.abs(currentLocalRemaining - newTempoRestante);

          // [CORREÇÃO FINAL]: Se o valor do servidor for IGUAL ao anterior, é payload estático.
          const oldVal = parseFloat(falaState.tempoRestanteSegundos);
          const newVal = parseFloat(newTempoRestante);

          let isStaticPayload = false;
          if (
            !isNaN(oldVal) &&
            !isNaN(newVal) &&
            Math.abs(oldVal - newVal) < 0.5
          ) {
            isStaticPayload = true;
          }

          if (isStaticPayload) {
            shouldResetTimer = false;
            // console.log("[Timer] Payload estático detectado. Ignorando reset.");
          }
          // [PATCH]: Aumentando tolerância para 15s. O servidor manda updates a cada 5s.
          // Com tolerância < 5, qualquer lag de rede fazia o diff ser > 5 (ex: 5.1) e resetava.
          else if (diff < 15) {
            shouldResetTimer = false;
            console.log(
              `[Timer] Drift de ${diff.toFixed(2)}s ignorado (<15s). Mantendo contagem local.`,
            );
          } else {
            console.log(
              `[Timer] Drift de ${diff.toFixed(2)}s detectado (>15s). Sincronizando (possível edição manual).`,
            );
          }
        }

        falaState = {
          camaraId: payload.camaraId,
          historicoFalaId: payload.historicoFalaId,
          oradorId: payload.oradorId,
          oradorNome: payload.oradorNome,
          oradorFotoUrl: payload.oradorFotoUrl,
          partidoSigla: payload.partidoSigla,
          tempoFalaMinutos: payload.tempoFalaMinutos,
          tempoAdicionadoTotalMinutos: payload.tempoAdicionadoTotalMinutos,
          tempoRestanteSegundos: payload.tempoRestanteSegundos,
          status: payload.status,
          preparadaEm: payload.preparadaEm,
          iniciadaEm: payload.iniciadaEm,
          encerradaEm: payload.encerradaEm,
          timestamp: serverTimestamp,
        };

        if (shouldResetTimer && falaState.tempoRestanteSegundos != null) {
          timerAnchorMs = Date.now();
          timerAnchorRemaining = Math.max(
            0,
            Math.trunc(Number(falaState.tempoRestanteSegundos)),
          );
          // Reiniciar o loop apenas se resetamos o anchor (ou se não estava rodando)
          startTimerLoop();
        } else if (!timerInterval) {
          // Se não resetamos, mas o loop não estava rodando (ex: page refresh?), inicia.
          startTimerLoop();
        }

        if (falaState.status === "tempo_esgotado") {
          timeUpReportedToServer = true;
        }

        renderBase();

        if (falaState.status === "encerrada") {
          stopTimer();
          window.location.href = `/tv/espera.html?t=${Date.now()}`;
          return;
        }
      }

      // Polls the backend for the current speech state as a socket fallback.
      async function syncFalaStatus() {
        if (!camaraId) return;

        const token = localStorage.getItem("authToken");
        if (!token) return;

        try {
          const resp = await fetch(`/api/fala-ao-vivo/status/${camaraId}`, {
            headers: { Authorization: `Bearer ${token}` },
          });

          if (!resp.ok) return;

          const data = await resp.json();
          if (!data || !data.isLive || !data.fala) {
            // sem fala ativa: voltar para espera
            window.location.href = `/tv/espera.html?t=${Date.now()}`;
            return;
          }

          applyFalaUpdate(data.fala);
        } catch (e) {
          // ignora: fallback é o socket
        }
      }

      // Authenticates the TV screen, loads chamber context, and wires socket events.
      async function init() {
        const isAuthenticated = await protectPage({
          allowedRoles: ["tv"],
          requireAuth: true,
          autoRedirect: true,
        });

        if (!isAuthenticated) {
          return;
        }

        const token = localStorage.getItem("authToken");
        if (!token) return;

        // Descobre a câmara (igual ao template base)
        try {
          const resp = await fetch("/api/me", {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (!resp.ok) {
            window.location.href = `/tv/espera.html?t=${Date.now()}`;
            return;
          }
          const me = await resp.json();
          camaraId =
            (me.profile && me.profile.camara_id) || (me.camara && me.camara.id);
        } catch (e) {
          window.location.href = `/tv/espera.html?t=${Date.now()}`;
          return;
        }

        // Primeira render (placeholder)
        renderBase();

        // Carrega estado atual como fallback
        await syncFalaStatus();

        // Socket
        if (typeof io === "undefined") {
          // tenta carregar novamente
          await new Promise((resolve, reject) => {
            const s = document.createElement("script");
            s.src = "https://cdn.socket.io/4.7.2/socket.io.min.js";
            s.onload = resolve;
            s.onerror = () => reject(new Error("Falha ao carregar Socket.IO"));
            document.head.appendChild(s);
          });
        }

        tvSocket = io(undefined, { auth: { token } });

        tvSocket.on("connect", async () => {
          setConnectionBadge(true, "Conectado");
          if (camaraId) {
            tvSocket.emit("tv:join-camara", { camaraId });
          }
          await syncFalaStatus();
        });

        tvSocket.on("disconnect", () => {
          setConnectionBadge(false, "Desconectado");
        });

        tvSocket.on("tv:iniciar-fala", (payload) => {
          applyFalaUpdate(payload);
        });

        tvSocket.on("tv:iniciar-fala-start", (payload) => {
          applyFalaUpdate(payload);
        });

        tvSocket.on("tv:encerrar-fala", () => {
          window.location.href = `/tv/espera.html?t=${Date.now()}`;
        });

        // Atualizações genéricas (por segurança)
        tvSocket.on("tv:fala-ao-vivo-update", (payload) => {
          applyFalaUpdate(payload);
        });
      }

      // Start the TV speech display lifecycle.
      init();
    </script>
  </body>
</html>
