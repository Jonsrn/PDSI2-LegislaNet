<!DOCTYPE html>
<!--
  New Agenda Item Page
  Provides the authenticated chamber administrator workflow for creating
  agenda items, selecting sessions, attaching PDFs, and enabling symbolic voting.
-->
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Pauta - Legisla Net</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏛️</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"
    />

    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/forms.css" />
    <link rel="stylesheet" href="../css/toast.css" />
    <link rel="stylesheet" href="../css/customSelect.css" />
    <style>
      .file-input-help {
        display: block;
        color: var(--secondary-text);
        font-size: 0.8rem;
        margin-top: 4px;
        font-style: italic;
      }

      /* Evita o texto nativo do input file duplicar no layout */
      #file-input {
        position: absolute;
        left: -9999px;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      @media (max-width: 768px) {
        .form-input,
        .form-select,
        .custom-select-trigger {
          font-size: 16px;
          padding: 9px 11px;
          min-height: 40px;
        }

        .checkbox-card {
          padding: 10px 12px;
        }
      }

      .checkbox-card {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background-color: var(--hover-bg);
      }

      .checkbox-card input[type="checkbox"] {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        accent-color: var(--accent-blue);
      }

      .checkbox-card .checkbox-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
        line-height: 1.2;
      }

      .checkbox-card .checkbox-title {
        font-weight: 600;
        color: var(--primary-text);
      }

      .checkbox-card .checkbox-subtitle {
        font-size: 0.875rem;
        color: var(--secondary-text);
      }
    </style>
  </head>
  <body>
    <!-- Application shell with shared sidebar and header placeholders. -->
    <div class="app-layout">
      <div id="sidebar-placeholder"></div>
      <main class="main-content" id="mainContent">
        <div id="header-placeholder"></div>
        <!-- Agenda creation workspace with session, metadata, attachment, and voting options. -->
        <section class="form-section fade-in">
          <h2>Nova Pauta</h2>
          <!-- Session selector populated with available future sessions from the API. -->
          <div class="form-group" style="margin-top: 24px">
            <label data-required="true">Sessão</label>
            <div class="custom-select-wrapper" id="sessao-custom-select">
              <input type="hidden" id="sessao" name="sessao" />
              <div class="custom-select-trigger" id="sessao-trigger">
                <span>Carregando sessões...</span>
              </div>
              <div class="custom-options">
                <div class="custom-option-placeholder">Carregando...</div>
              </div>
            </div>
            <div
              id="sessao-error"
              class="form-field-error"
              style="display: none"
            ></div>
          </div>
          <!-- Agenda author field with inline validation and character count. -->
          <div class="form-group" style="margin-top: 24px">
            <label for="autor" data-required="true">Autor da pauta</label>
            <input
              type="text"
              id="autor"
              class="form-input"
              maxlength="100"
              placeholder="Ex: Ver. João Silva"
              required
            />
            <div
              id="autor-error"
              class="form-field-error"
              style="display: none"
            ></div>
            <small
              style="
                color: var(--secondary-text);
                font-size: 0.75rem;
                margin-top: 2px;
                display: block;
              "
            >
              <span id="autor-count">0</span>/100 caracteres
            </small>
          </div>
          <!-- Agenda title field with inline validation and character count. -->
          <div class="form-group">
            <label for="nome" data-required="true">Nome</label>
            <input
              type="text"
              id="nome"
              class="form-input"
              required
              maxlength="150"
              placeholder="Ex: Projeto de Lei 001/2025"
            />
            <div
              id="nome-error"
              class="form-field-error"
              style="display: none"
            ></div>
            <small
              style="
                color: var(--secondary-text);
                font-size: 0.75rem;
                margin-top: 2px;
                display: block;
              "
            >
              <span id="nome-count">0</span>/150 caracteres
            </small>
          </div>
          <!-- Initial agenda status selector. -->
          <div class="form-group">
            <label for="status">Status da Pauta</label>
            <div class="custom-select-wrapper" id="status-custom-select">
              <input type="hidden" id="status" name="status" value="Pendente" />
              <div class="custom-select-trigger" id="status-trigger">
                <span>Pendente</span>
              </div>
              <div class="custom-options">
                <div class="custom-option" data-value="Pendente">
                  <span>Pendente</span>
                </div>
                <div class="custom-option" data-value="Em Votação">
                  <span>Em Votação</span>
                </div>
              </div>
            </div>
          </div>
          <!-- Agenda description field with inline validation and character count. -->
          <div class="form-group">
            <label for="descricao" data-required="true">Descrição</label>
            <textarea
              id="descricao"
              class="form-textarea"
              maxlength="500"
              placeholder="Descreva brevemente o conteúdo da pauta..."
            ></textarea>
            <div
              id="descricao-error"
              class="form-field-error"
              style="display: none"
            ></div>
            <small
              style="
                color: var(--secondary-text);
                font-size: 0.75rem;
                margin-top: 2px;
                display: block;
              "
            >
              <span id="descricao-count">0</span>/500 caracteres
            </small>
          </div>
          <!-- PDF attachment upload control with file type and size guidance. -->
          <div class="form-group">
            <label for="file-input">Arquivo PDF</label>
            <div class="file-input-wrapper">
              <label for="file-input" class="file-input-button"
                >Procurar PDF...</label
              >
              <span id="file-name" class="file-input-text"
                >Nenhum arquivo selecionado.</span
              >
              <input
                type="file"
                id="file-input"
                accept=".pdf"
                multiple="false"
              />
            </div>
            <small class="file-input-help"
              >Apenas arquivos PDF são aceitos. Tamanho máximo: 10MB</small
            >
          </div>
          <!-- Optional symbolic voting setup for the new agenda item. -->
          <label class="checkbox-card" style="margin-top: 16px">
            <input type="checkbox" id="simbolica" />
            <span class="checkbox-text">
              <span class="checkbox-title">Votação simbólica</span>
              <span class="checkbox-subtitle"
                >Cria a pauta já preparada para votação simbólica.</span
              >
            </span>
          </label>

          <!-- Form actions for cancelling or submitting the new agenda item. -->
          <div class="form-actions" style="justify-content: flex-end">
            <button type="button" class="btn btn-secondary" id="btn-voltar">
              <i class="fa-solid fa-arrow-left"></i> Voltar
            </button>
            <button type="submit" id="btnCadastrar" class="btn btn-primary">
              <i class="fa-solid fa-save"></i> Cadastrar Pauta
            </button>
          </div>
        </section>
      </main>
    </div>

    <script src="../js/mockMode.js?v=4"></script>
    <script src="../js/global.js"></script>
    <script src="../js/forms.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/customSelect.js"></script>
    <script>
      // Page-level state for custom selectors and validation behavior.
      let sessaoCustomSelect;
      let statusCustomSelect;

      let submitAttempted = false;

      // Initialize authentication, layout, selectors, data loading, and form behavior.
      document.addEventListener("DOMContentLoaded", async () => {
        try {
          // === NOVA AUTENTICAÇÃO COM VALIDAÇÃO DE ROLE ===
          try {
            await protectPage({
              allowedRoles: ["admin_camara"],
              requireAuth: true,
              autoRedirect: true,
            });
          } catch (error) {
            console.error("[AUTH] Falha na autenticação:", error);
            return;
          }
          initLayout({
            title: "Nova Pauta",
            icon: "fa-file-pen",
            navActive: "nav-cadastro",
          });

          initSessaoCustomSelect();
          initStatusCustomSelect();

          // Carregar sessões disponíveis
          await carregarSessoes();

          // Configurar evento do formulário
          configurarFormulario();

          // Configurar input de arquivo
          configurarInputArquivo();

          // Configurar validações e contadores
          configurarValidacoes();
        } catch (e) {
          console.error(e.message);
          return;
        }
      });

      // Initialize the session selector used to bind the agenda item to a session.
      function initSessaoCustomSelect() {
        if (typeof window.CustomSelect === "undefined") {
          console.error("CustomSelect não está disponível");
          showToast("Erro: CustomSelect não carregado", "error");
          return;
        }

        sessaoCustomSelect = new CustomSelect({
          wrapperId: "sessao-custom-select",
          placeholder: "Selecione a sessão correspondente",
          onSelect: () => {
            limparErro("sessao");
          },
        });
      }

      // Initialize the status selector with the default pending state.
      function initStatusCustomSelect() {
        if (typeof window.CustomSelect === "undefined") return;

        statusCustomSelect = new CustomSelect({
          wrapperId: "status-custom-select",
          placeholder: "Selecione...",
        });

        // Garantir padrão
        if (statusCustomSelect) {
          statusCustomSelect.setValue("Pendente");
        }
      }

      // Fetch available future sessions and populate the session selector.
      async function carregarSessoes() {
        try {
          console.log("📡 Carregando sessões disponíveis...");

          const sessaoInput = document.getElementById("sessao");
          if (!sessaoInput || !sessaoCustomSelect) {
            throw new Error("Campo de sessão não encontrado");
          }

          const token = localStorage.getItem("authToken");
          if (!token) {
            throw new Error("Token não encontrado");
          }

          const response = await fetch("/api/sessoes/disponiveis", {
            method: "GET",
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
          });

          if (!response.ok) {
            throw new Error(`Erro ao carregar sessões: ${response.status}`);
          }

          const result = await response.json();
          const sessoes = result.data || [];
          console.log("📊 Sessões recebidas:", sessoes.length);

          if (sessoes.length === 0) {
            console.log("⚠️ Nenhuma sessão disponível");
            sessaoCustomSelect.placeholder =
              "Nenhuma sessão agendada disponível";
            sessaoCustomSelect.populateOptions([
              { value: "", text: "Nenhuma sessão agendada disponível" },
            ]);
            sessaoCustomSelect.reset();
            return;
          }

          const options = [
            { value: "", text: "Selecione a sessão correspondente" },
          ];

          // Adicionar sessões
          sessoes.forEach((sessao) => {
            const dataFormatada = new Date(sessao.data_sessao).toLocaleString(
              "pt-BR",
              {
                day: "2-digit",
                month: "2-digit",
                year: "numeric",
                hour: "2-digit",
                minute: "2-digit",
              }
            );

            options.push({
              value: sessao.id,
              text: `${sessao.nome} - ${dataFormatada}`,
            });
          });

          sessaoCustomSelect.placeholder = "Selecione a sessão correspondente";
          sessaoCustomSelect.populateOptions(options);
          sessaoCustomSelect.reset();

          console.log(
            "✅ Sessões carregadas com sucesso:",
            sessoes.length,
            "opções"
          );
        } catch (error) {
          console.error("❌ Erro ao carregar sessões:", error);
          if (sessaoCustomSelect) {
            sessaoCustomSelect.placeholder = "Erro ao carregar sessões";
            sessaoCustomSelect.populateOptions([
              { value: "", text: "Erro ao carregar sessões" },
            ]);
            sessaoCustomSelect.reset();
          }
          showToast("Erro ao carregar sessões disponíveis", "error");
        }
      }

      // Register field validation rules and character counters.
      function configurarValidacoes() {
        // Campos com contadores
        const campos = [
          { id: "nome", max: 150 },
          { id: "autor", max: 100 },
          { id: "descricao", max: 500 },
        ];

        campos.forEach((campo) => {
          const input = document.getElementById(campo.id);
          const counter = document.getElementById(`${campo.id}-count`);

          if (input && counter) {
            // Atualizar contador em tempo real
            input.addEventListener("input", () => {
              const count = input.value.length;
              counter.textContent = count;

              // Mudar cor quando perto do limite
              if (count > campo.max * 0.9) {
                counter.style.color = "var(--accent-orange)";
              } else if (count >= campo.max) {
                counter.style.color = "var(--accent-red)";
              } else {
                counter.style.color = "var(--secondary-text)";
              }

              // Validação em tempo real como nova_camara:
              // - se tem conteúdo: valida e mostra erro
              // - se apagou tudo: some o erro
              validateFieldLive(campo.id);
            });

            input.addEventListener("blur", () => {
              // Depois de tentar enviar, reforça validação ao sair do campo
              if (submitAttempted) validateFieldLive(campo.id);
            });
          }
        });

        // UX de validação: ao focar, limpa erro (não valida aqui)
        ["autor", "nome", "descricao"].forEach((fieldId) => {
          const el = document.getElementById(fieldId);
          if (!el) return;
          el.addEventListener("focus", () => limparErro(fieldId));
        });

        const sessaoTrigger = document.getElementById("sessao-trigger");
        if (sessaoTrigger) {
          sessaoTrigger.addEventListener("click", () => limparErro("sessao"));
        }
      }

      // Validate individual fields during user input without blocking empty draft states.
      function validateFieldLive(fieldId) {
        const el = document.getElementById(fieldId);
        if (!el) return true;

        const rawValue = (el.value ?? "").toString();
        const value = rawValue.trim();

        // Se usuário apagou tudo, não mantém erro “grudado”
        if (!value) {
          limparErro(fieldId);
          return true;
        }

        if (fieldId === "autor") {
          if (value.length < 3) {
            mostrarErro("autor", "Autor deve ter pelo menos 3 caracteres");
            return false;
          }
          if (value.length > 100) {
            mostrarErro("autor", "Autor não pode exceder 100 caracteres");
            return false;
          }
          limparErro("autor");
          return true;
        }

        if (fieldId === "nome") {
          if (value.length < 5) {
            mostrarErro("nome", "Nome deve ter pelo menos 5 caracteres");
            return false;
          }
          if (value.length > 150) {
            mostrarErro("nome", "Nome não pode exceder 150 caracteres");
            return false;
          }
          limparErro("nome");
          return true;
        }

        if (fieldId === "descricao") {
          if (value.length > 0 && value.length < 10) {
            mostrarErro(
              "descricao",
              "Descrição deve ter pelo menos 10 caracteres"
            );
            return false;
          }
          if (value.length > 500) {
            mostrarErro(
              "descricao",
              "Descrição não pode exceder 500 caracteres"
            );
            return false;
          }
          limparErro("descricao");
          return true;
        }

        return true;
      }

      // Função para mostrar erro de validação
      function mostrarErro(campoId, mensagem) {
        const errorDiv = document.getElementById(`${campoId}-error`);
        const campo = document.getElementById(campoId);

        if (campo) {
          if (
            campo.tagName === "SELECT" ||
            (campo.tagName === "INPUT" && campo.type === "hidden")
          ) {
            const wrapper = campo.closest(".custom-select-wrapper");
            const trigger = wrapper?.querySelector(".custom-select-trigger");
            (trigger || campo).classList.add("form-select-error");
          } else {
            campo.classList.add("form-input-error");
          }
        }

        if (errorDiv) {
          errorDiv.textContent = mensagem;
          errorDiv.style.display = "flex";
          return true;
        }
        return false;
      }

      // Função para limpar erro de validação
      function limparErro(campoId) {
        const errorDiv = document.getElementById(`${campoId}-error`);
        const campo = document.getElementById(campoId);

        if (campo) {
          const wrapper = campo.closest?.(".custom-select-wrapper");
          const trigger = wrapper?.querySelector?.(".custom-select-trigger");
          (trigger || campo).classList.remove("form-input-error");
          (trigger || campo).classList.remove("form-select-error");
        }

        if (errorDiv) {
          errorDiv.style.display = "none";
          errorDiv.textContent = "";
        }
      }

      // Função para limpar todos os erros
      function limparTodosErros() {
        ["sessao", "nome", "autor", "descricao"].forEach(limparErro);
      }

      // Check whether the selected session already has an agenda item with the same name.
      async function verificarDuplicidade(nome, sessaoId) {
        try {
          const token = localStorage.getItem("authToken");
          if (!token) return false;

          const response = await fetch(
            `/api/pautas?nome=${encodeURIComponent(
              nome
            )}&sessao_id=${sessaoId}`,
            {
              method: "GET",
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
              },
            }
          );

          if (response.ok) {
            const result = await response.json();
            return result.data && result.data.length > 0;
          }

          return false;
        } catch (error) {
          console.error("Erro ao verificar duplicidade:", error);
          return false;
        }
      }

      // Register PDF upload validation and selected file name display.
      function configurarInputArquivo() {
        const fileInput = document.getElementById("file-input");
        const fileName = document.getElementById("file-name");

        fileInput.addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (file) {
            // Verificar se é PDF
            if (file.type !== "application/pdf") {
              alert("Apenas arquivos PDF são aceitos!");
              fileInput.value = "";
              fileName.textContent = "Nenhum arquivo selecionado.";
              return;
            }

            // Verificar tamanho (10MB = 10 * 1024 * 1024 bytes)
            if (file.size > 10 * 1024 * 1024) {
              alert("Arquivo muito grande! Tamanho máximo: 10MB");
              fileInput.value = "";
              fileName.textContent = "Nenhum arquivo selecionado.";
              return;
            }

            fileName.textContent = file.name;
          } else {
            fileName.textContent = "Nenhum arquivo selecionado.";
          }
        });
      }

      // Register submit and cancel handlers for the creation form.
      function configurarFormulario() {
        const btnCadastrar = document.getElementById("btnCadastrar");
        const btnVoltar = document.getElementById("btn-voltar");

        btnCadastrar.addEventListener("click", async (e) => {
          e.preventDefault();
          await cadastrarPauta();
        });

        // Botão voltar com confirmação
        btnVoltar.addEventListener("click", () => {
          if (confirm("Deseja voltar? Os dados não salvos serão perdidos.")) {
            navigateToPage("cadastro");
          }
        });
      }

      // Validate, submit, and reset the new agenda item form.
      async function cadastrarPauta() {
        try {
          submitAttempted = true;

          const btnCadastrar = document.getElementById("btnCadastrar");
          const originalText = btnCadastrar.textContent;

          // Desabilitar botão e mostrar loading
          btnCadastrar.disabled = true;
          btnCadastrar.textContent = "Cadastrando...";

          // Coletar dados do formulário
          const formData = new FormData();

          const sessao_id = document.getElementById("sessao").value;
          const autor = document.getElementById("autor").value.trim();
          const nome = document.getElementById("nome").value.trim();
          const status = document.getElementById("status").value;
          const descricao = document.getElementById("descricao").value.trim();
          const votacao_simbolica =
            document.getElementById("simbolica").checked;
          const fileInput = document.getElementById("file-input");

          // Limpar erros anteriores
          limparTodosErros();

          let hasErrors = false;

          // Validações com form-field-error
          if (!sessao_id) {
            mostrarErro("sessao", "Selecione uma sessão");
            hasErrors = true;
          }

          if (!autor.trim()) {
            mostrarErro("autor", "Autor da pauta é obrigatório");
            hasErrors = true;
          } else if (autor.trim().length < 3) {
            mostrarErro("autor", "Autor deve ter pelo menos 3 caracteres");
            hasErrors = true;
          } else if (autor.trim().length > 100) {
            mostrarErro("autor", "Autor não pode exceder 100 caracteres");
            hasErrors = true;
          }

          if (!nome.trim()) {
            mostrarErro("nome", "Nome da pauta é obrigatório");
            hasErrors = true;
          } else if (nome.trim().length < 5) {
            mostrarErro("nome", "Nome deve ter pelo menos 5 caracteres");
            hasErrors = true;
          } else if (nome.trim().length > 150) {
            mostrarErro("nome", "Nome não pode exceder 150 caracteres");
            hasErrors = true;
          }

          if (!descricao.trim()) {
            mostrarErro("descricao", "Descrição é obrigatória");
            hasErrors = true;
          }

          if (descricao.trim().length > 0 && descricao.trim().length < 10) {
            mostrarErro(
              "descricao",
              "Descrição deve ter pelo menos 10 caracteres"
            );
            hasErrors = true;
          }

          if (descricao.trim().length > 500) {
            mostrarErro(
              "descricao",
              "Descrição não pode exceder 500 caracteres"
            );
            hasErrors = true;
          }

          if (hasErrors) {
            return;
          }

          // Verificar duplicidade de pauta na sessão
          if (await verificarDuplicidade(nome.trim(), sessao_id)) {
            mostrarErro(
              "nome",
              "Já existe uma pauta com este nome nesta sessão"
            );
            return;
          }

          // Adicionar dados ao FormData
          formData.append("sessao_id", sessao_id);
          formData.append("nome", nome);
          formData.append("status", status);
          formData.append("votacao_simbolica", votacao_simbolica);

          if (autor) formData.append("autor", autor);
          if (descricao) formData.append("descricao", descricao);

          // Adicionar arquivo se selecionado
          if (fileInput.files[0]) {
            formData.append("arquivo", fileInput.files[0]);
          }

          const token = localStorage.getItem("authToken");
          if (!token) {
            throw new Error("Token não encontrado");
          }

          const response = await fetch("/api/pautas", {
            method: "POST",
            headers: {
              Authorization: `Bearer ${token}`,
              // Não definir Content-Type para FormData - o browser faz isso automaticamente
            },
            body: formData,
          });

          const result = await response.json();

          if (!response.ok) {
            throw new Error(result.error || `Erro ${response.status}`);
          }

          showToast("Pauta(s) cadastrada(s) com sucesso!", "success");

          // Limpar formulário
          if (sessaoCustomSelect) {
            sessaoCustomSelect.reset();
          } else {
            document.getElementById("sessao").value = "";
          }

          if (statusCustomSelect) {
            statusCustomSelect.setValue("Pendente");
          } else {
            document.getElementById("status").value = "Pendente";
          }
          document.getElementById("autor").value = "";
          document.getElementById("nome").value = "";
          document.getElementById("descricao").value = "";
          document.getElementById("file-input").value = "";
          document.getElementById("file-name").textContent =
            "Nenhum arquivo selecionado.";
          document.getElementById("simbolica").checked = false;

          // Resetar contadores
          document.getElementById("autor-count").textContent = "0";
          document.getElementById("nome-count").textContent = "0";
          document.getElementById("descricao-count").textContent = "0";
        } catch (error) {
          console.error("Erro ao cadastrar pauta:", error);
          showToast(error.message, "error");
        } finally {
          // Reabilitar botão
          const btnCadastrar = document.getElementById("btnCadastrar");
          btnCadastrar.disabled = false;
          btnCadastrar.textContent = "Cadastrar Pauta";
        }
      }
    </script>
  </body>
</html>
